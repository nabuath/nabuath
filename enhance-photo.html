<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Photo Enhancer</title>
<style>
  body { font-family: Arial, sans-serif; background: #1B2A4A; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 32px; gap: 20px; }
  h2 { color: #C8A96E; margin: 0; }
  .upload-area {
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    border: 2px dashed #C8A96E; border-radius: 10px; padding: 28px 48px;
    cursor: pointer; transition: background 0.2s;
  }
  .upload-area:hover { background: rgba(200,169,110,0.08); }
  .upload-area p { margin: 0; font-size: 14px; color: #aaa; }
  #fileInput { display: none; }
  .upload-btn {
    background: #C8A96E; color: #111; border: none; padding: 10px 24px;
    border-radius: 6px; font-weight: 700; font-size: 13px; cursor: pointer;
  }
  .controls { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
  label { font-size: 13px; color: #aaa; display: flex; flex-direction: column; gap: 4px; align-items: center; }
  input[type=range] { width: 140px; accent-color: #C8A96E; }
  .canvases { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
  .panel { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .panel span { font-size: 12px; color: #aaa; }
  canvas { border-radius: 8px; max-width: 340px; border: 2px solid #333; }
  .dl-btn { background: #C8A96E; color: #111; border: none; padding: 12px 28px; border-radius: 6px; font-weight: 700; font-size: 14px; cursor: pointer; display: none; }
  .dl-btn:hover { background: #DFC28E; }
  #status { font-size: 13px; color: #C8A96E; }
  #main { display: none; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
</style>
</head>
<body>

<h2>Profile Photo Enhancer</h2>

<!-- Step 1: File picker -->
<div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
  <p>&#128247; Click to select your profile photo</p>
  <button class="upload-btn" type="button">Browse Photo</button>
  <p style="font-size:12px;">Works with JPG, PNG — runs entirely in your browser</p>
</div>
<input type="file" id="fileInput" accept="image/*" />

<div id="status"></div>

<!-- Step 2: Enhance (shown after image loads) -->
<div id="main">
  <div class="controls">
    <label>Noise Reduction <input type="range" id="blur" min="0" max="3" step="0.1" value="0.8" /></label>
    <label>Sharpness      <input type="range" id="sharp" min="0" max="3" step="0.1" value="1.4" /></label>
    <label>Brightness     <input type="range" id="bright" min="-30" max="30" step="1" value="5" /></label>
    <label>Contrast       <input type="range" id="contrast" min="-30" max="30" step="1" value="10" /></label>
    <label>Saturation     <input type="range" id="sat" min="-50" max="50" step="1" value="8" /></label>
  </div>

  <div class="canvases">
    <div class="panel"><span>Original</span><canvas id="orig"></canvas></div>
    <div class="panel"><span>Enhanced</span><canvas id="out"></canvas></div>
  </div>

  <button class="dl-btn" id="dl">&#8681; Download Enhanced Photo</button>
</div>

<script>
const fileInput  = document.getElementById('fileInput');
const uploadArea = document.getElementById('uploadArea');
const mainDiv    = document.getElementById('main');
const statusEl   = document.getElementById('status');
const origCanvas = document.getElementById('orig');
const outCanvas  = document.getElementById('out');
const origCtx    = origCanvas.getContext('2d');
const outCtx     = outCanvas.getContext('2d');
const dlBtn      = document.getElementById('dl');

let img = null;

fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  statusEl.textContent = 'Loading...';
  const reader = new FileReader();
  reader.onload = (ev) => {
    img = new Image();
    img.onload = () => {
      uploadArea.style.display = 'none';
      mainDiv.style.display = 'flex';
      dlBtn.style.display = 'inline-block';
      statusEl.textContent = 'Image loaded — adjust sliders to enhance.';
      origCanvas.width = outCanvas.width = img.naturalWidth;
      origCanvas.height = outCanvas.height = img.naturalHeight;
      origCtx.drawImage(img, 0, 0);
      applyEnhancements();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

function applyEnhancements() {
  if (!img) return;
  const blurAmt     = parseFloat(document.getElementById('blur').value);
  const sharpAmt    = parseFloat(document.getElementById('sharp').value);
  const brightAmt   = parseInt(document.getElementById('bright').value);
  const contrastAmt = parseInt(document.getElementById('contrast').value);
  const satAmt      = parseInt(document.getElementById('sat').value);

  const W = img.naturalWidth, H = img.naturalHeight;

  // Blur pass (noise reduction)
  const tmp = document.createElement('canvas');
  tmp.width = W; tmp.height = H;
  const tmpCtx = tmp.getContext('2d');
  tmpCtx.filter = `blur(${blurAmt}px)`;
  tmpCtx.drawImage(img, 0, 0);
  tmpCtx.filter = 'none';
  const blurred = tmpCtx.getImageData(0, 0, W, H);

  // Original pixels
  const srcCvs = document.createElement('canvas');
  srcCvs.width = W; srcCvs.height = H;
  const srcCtx = srcCvs.getContext('2d');
  srcCtx.drawImage(img, 0, 0);
  const original = srcCtx.getImageData(0, 0, W, H);

  const out = outCtx.createImageData(W, H);
  const od = out.data, bd = blurred.data, src = original.data;
  const contFactor = (259 * (contrastAmt + 255)) / (255 * (259 - contrastAmt));

  for (let i = 0; i < od.length; i += 4) {
    for (let c = 0; c < 3; c++) {
      let px = src[i+c] + sharpAmt * (src[i+c] - bd[i+c]); // unsharp mask
      px += brightAmt;
      px = contFactor * (px - 128) + 128;
      od[i+c] = Math.max(0, Math.min(255, px));
    }
    // Saturation
    const r = od[i], g = od[i+1], b = od[i+2];
    const lum = 0.299*r + 0.587*g + 0.114*b;
    const s = 1 + satAmt / 100;
    od[i]   = Math.max(0, Math.min(255, lum + (r - lum) * s));
    od[i+1] = Math.max(0, Math.min(255, lum + (g - lum) * s));
    od[i+2] = Math.max(0, Math.min(255, lum + (b - lum) * s));
    od[i+3] = src[i+3];
  }
  outCtx.putImageData(out, 0, 0);
}

['blur','sharp','bright','contrast','sat'].forEach(id => {
  document.getElementById(id).addEventListener('input', applyEnhancements);
});

dlBtn.addEventListener('click', () => {
  const link = document.createElement('a');
  link.download = 'profile-enhanced.jpg';
  link.href = outCanvas.toDataURL('image/jpeg', 0.95);
  link.click();
});
</script>
</body>
</html>
